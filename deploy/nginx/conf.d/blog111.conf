upstream blog111_api {
    server blog-api:8080;
}

upstream blog111_web {
    server blog-web:80;
}

upstream blog111_admin {
    server admin-web:80;
}

server {
    listen 80;
    server_name hi-shuaiqiang.me www.hi-shuaiqiang.me;
    return 301 https://hi-shuaiqiang.me$request_uri;
}

server {
    listen 80;
    server_name api.hi-shuaiqiang.me;
    return 301 https://api.hi-shuaiqiang.me$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.hi-shuaiqiang.me;

    ssl_certificate /etc/nginx/certs/site/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/site/privkey.pem;

    return 301 https://hi-shuaiqiang.me$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hi-shuaiqiang.me;

    ssl_certificate /etc/nginx/certs/site/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/site/privkey.pem;

    location /api/ {
        proxy_pass http://blog111_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://blog111_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api.hi-shuaiqiang.me;

    ssl_certificate /etc/nginx/certs/api/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/api/privkey.pem;

    location /api/ {
        proxy_pass http://blog111_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://blog111_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
