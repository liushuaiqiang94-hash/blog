spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/blog111?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:blog111}
    password: ${SPRING_DATASOURCE_PASSWORD:blog111}
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.example.blogapi.domain
  configuration:
    map-underscore-to-camel-case: true

server:
  forward-headers-strategy: framework

blog:
  bootstrap:
    admin:
      username: ${BLOG_BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BLOG_BOOTSTRAP_ADMIN_PASSWORD:Lsq_818818}
