services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  blog-api:
    build:
      context: ./blog-api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      BLOG_BOOTSTRAP_ADMIN_USERNAME: ${BLOG_BOOTSTRAP_ADMIN_USERNAME}
      BLOG_BOOTSTRAP_ADMIN_PASSWORD: ${BLOG_BOOTSTRAP_ADMIN_PASSWORD}
      TZ: ${TZ}

  blog-web:
    build:
      context: ./blog-web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - blog-api

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - blog-api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - blog-web
      - admin-web
      - blog-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/nginx/certs/site/fullchain.pem:/etc/nginx/certs/site/fullchain.pem:ro
      - /etc/nginx/certs/site/privkey.pem:/etc/nginx/certs/site/privkey.pem:ro
      - /etc/nginx/certs/api/fullchain.pem:/etc/nginx/certs/api/fullchain.pem:ro
      - /etc/nginx/certs/api/privkey.pem:/etc/nginx/certs/api/privkey.pem:ro

volumes:
  mysql_data:
